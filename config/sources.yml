# ============================================================================
#  sources.yml  —  what the news scraper monitors
# ----------------------------------------------------------------------------
#  Each vendor has:
#    queries — Google News searches. Keep them PRODUCT-LEVEL (named products and
#              technologies) so results map cleanly onto the dashboard's product
#              lines: switchgear, reclosers, sensors, cable accessories, fault
#              current limiters, and grid software.
#    pages   — vendor pages whose links are scanned for articles / datasheets.
#
#  HOW TO ADD COVERAGE:
#    • Add a named product or technology to `queries` (e.g. "ABB Is-limiter").
#    • Add a newsroom/press URL to `pages`.
#  The classifier in scripts/update_tracker.py buckets each hit automatically.
# ============================================================================

vendors:
  - name: G&W Electric
    queries:
      - G&W Electric Viper recloser
      - G&W Electric AccuSense sensor
      - G&W Electric Trident SF6-free switchgear
      - G&W Electric CLiP fault current limiter
      - G&W Electric cable terminations separable connectors
    pages:
      - https://www.gwelectric.com/
      - https://www.gwelectric.com/news/

  - name: S&C Electric
    queries:
      - S&C IntelliRupter PulseCloser recloser
      - S&C TripSaver cutout-mounted recloser
      - S&C IntelliTeam FLISR self-healing grid
      - S&C Vista switchgear SF6-free
    pages:
      - https://www.sandc.com/
      - https://www.sandc.com/en/company/newsroom/

  - name: ABB
