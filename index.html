<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GridIntel — MV Competitive Intelligence</title>
  <meta name="description" content="Competitive intelligence dashboard for medium-voltage electrical equipment." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <!-- ============================ SIDEBAR ============================ -->
    <aside class="sidebar">
      <div class="brand" title="Home">
        <div class="brand-mark">GI</div>
        <div>
          <h1>GridIntel</h1>
          <p>MV competitive intelligence</p>
        </div>
      </div>

      <!-- nav is built by app.js (buildNav) from the categories data -->
      <nav class="nav" id="nav" aria-label="Primary"></nav>

      <div class="sidebar-foot">
        <div class="lbl">Data refreshed</div>
        <div class="val" id="lastUpdated">—</div>
      </div>
    </aside>

    <!-- ============================ CONTENT =========================== -->
    <div class="content">
      <header class="topbar">
        <div class="titles">
          <p class="eyebrow">Competitive intelligence</p>
          <h2 id="pageTitle">Competitive Overview</h2>
          <p class="sub" id="pageSub"></p>
        </div>
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="globalSearch" type="search" placeholder="Search companies, products, news…" aria-label="Search" />
        </div>
      </header>

      <main class="page" id="app-main"><!-- rendered by app.js --></main>
    </div>
  </div>

  <!-- =============================== DATA ============================== -->
  <!-- Edit these files to add competitors, products, specs, news, summaries -->
  <script src="data/categories.js"></script>
  <script src="data/competitors.js"></script>
  <script src="data/products.js"></script>
  <script src="data/news.js"></script>
  <script src="data/ai-summaries.js"></script>
  <script src="data/comparisons.js"></script>
  <script src="data/explorers.js"></script>

  <!-- ============================ APP CODE ============================ -->
  <script src="assets/lib.js"></script>
  <script src="assets/explorer.js"></script>
  <script src="assets/comparison.js"></script>
  <script src="assets/pages.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
